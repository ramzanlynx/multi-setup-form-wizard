<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="colorlib.com" />

    <!-- MATERIAL DESIGN ICONIC FONT -->
    <link rel="stylesheet" href="fonts/material-design-iconic-font/css/material-design-iconic-font.css" />

    <!-- DATE-PICKER -->
    <link rel="stylesheet" href="vendor/date-picker/css/datepicker.min.css" />

    <!-- STYLE CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/form-validation.css" />
  </head>
  <body>
    <div class="wrapper">
      <form action="https://lynx4669.us2.mockoon.app/form-submit" method="POST" id="wizard" autocomplete="on">
        <!-- SECTION 1 -->
        <h4></h4>
        <section>
          <h3>Basic details</h3>
          <div class="form-row">
            <div class="form-holder">
              <i class="zmdi zmdi-account"></i>
              <input id="firstName" type="text" class="form-control" placeholder="First Name" />
              <span id="firstName-msg" class="validation-message"></span>
              <span id="firstName-icon" class="validation-icon"></span>
            </div>
            <div class="form-holder">
              <i class="zmdi zmdi-account"></i>
              <input type="text" id="lastName" class="form-control" placeholder="Last Name" />
              <span id="lastName-msg" class="validation-message"></span>
              <span id="lastName-icon" class="validation-icon"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-holder">
              <i class="zmdi zmdi-email"></i>
              <input type="text" id="emailId" class="form-control" placeholder="Email ID" />
              <span id="emailId-msg" class="validation-message"></span>
              <span id="emailId-icon" class="validation-icon"></span>
            </div>
            <div class="form-holder">
              <i class="zmdi zmdi-account-box-o"></i>
              <input type="text" class="form-control" id="userId" placeholder="Your User ID" />
              <span id="userId-msg" class="validation-message"></span>
              <span id="userId-icon" class="validation-icon"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-holder">
              <i class="zmdi zmdi-map"></i>
              <input type="text" id="country" class="form-control" placeholder="Country" />
              <span id="country-msg" class="validation-message"></span>
              <span id="country-icon" class="validation-icon"></span>
            </div>
            <div class="form-group">
              <div class="form-holder">
                <i class="zmdi zmdi-pin"></i>
                <input type="text" id="state" class="form-control" placeholder="State" />
                <span id="state-msg" class="validation-message"></span>
                <span id="state-icon" class="validation-icon"></span>
              </div>
              <div class="form-holder">
                <i class="zmdi zmdi-pin-drop"></i>
                <input type="text" id="city" class="form-control" placeholder="City" />
                <span id="city-msg" class="validation-message"></span>
                <span id="city-icon" class="validation-icon"></span>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-holder">
              <i class="zmdi zmdi-smartphone-android"></i>
              <input type="text" id="phoneNumber" class="form-control" placeholder="Phone Number" />
              <span id="phoneNumber-msg" class="validation-message"></span>
              <span id="phoneNumber-icon" class="validation-icon"></span>
            </div>
            <div class="form-holder password">
              <i class="zmdi zmdi-eye"></i>
              <input type="password" id="referenceCode" class="form-control" placeholder="Reference Code" />
              <span id="referenceCode-msg" class="validation-message"></span>
              <span id="referenceCode-icon" class="validation-icon"></span>
            </div>
          </div>
        </section>

        <!-- SECTION 2 -->
        <h4></h4>
        <section>
          <h3>Password change</h3>
          <div class="form-row">
            <div class="form-holder w-100">
              <input type="password" id="currentPassword" class="form-control" placeholder="Current Password" />
              <i class="zmdi zmdi-lock-open"></i>
              <span id="currentPassword-msg" class="validation-message"></span>
              <span id="currentPassword-icon" class="validation-icon"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-holder w-100">
              <input
                type="password"
                id="confirmCurrentPassword"
                class="form-control"
                placeholder="Confirm Current Password" />
              <i class="zmdi zmdi-lock-open"></i>
              <span id="confirmCurrentPassword-msg" class="validation-message"></span>
              <span id="confirmCurrentPassword-icon" class="validation-icon"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-holder w-100">
              <input type="password" id="newPassword" class="form-control" placeholder="New Password" />
              <i class="zmdi zmdi-lock-open"></i>
              <span id="newPassword-msg" class="validation-message"></span>
              <span id="newPassword-icon" class="validation-icon"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-holder w-100">
              <input type="password" id="confirmNewPassword" class="form-control" placeholder="Confirm New Password" />
              <i class="zmdi zmdi-lock-open"></i>
              <span id="confirmNewPassword-msg" class="validation-message"></span>
              <span id="confirmNewPassword-icon" class="validation-icon"></span>
            </div>
          </div>
        </section>

        <!-- SECTION 3 -->
        <h4></h4>
        <section>
          <h3 style="margin-bottom: 16px">My Cart</h3>
          <table
            cellspacing="0"
            class="table-cart shop_table shop_table_responsive cart woocommerce-cart-form__contents table"
            id="shop_table">
            <thead>
              <th>&nbsp;</th>
              <th style="text-align: left">Product Detail</th>
              <th>Quantity</th>
              <th>Total Price</th>
              <th>&nbsp;</th>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <!-- SECTION 4 -->
        <h4></h4>
        <section>
          <h3>Cart Totals</h3>
          <div class="cart_totals">
            <table cellspacing="0" class="shop_table shop_table_responsive">
              <tr class="cart-subtotal">
                <th>Subtotal</th>
                <td data-title="Subtotal">
                  <span class="woocommerce-Price-amount amount">
                    <span class="woocommerce-Price-currencySymbol">$</span>110.00
                  </span>
                </td>
              </tr>
              <tr class="cart-subtotal shipping">
                <th>Shipping:</th>
                <td data-title="Subtotal">
                  <div class="checkbox">
                    <label>
                      <input type="radio" name="shipping" data-cost="0" checked /> Free Shipping
                      <span class="checkmark"></span>
                    </label>
                    <label>
                      <input type="radio" name="shipping" data-cost="2.50" /> Local pickup: <span>$</span><span>2.50</span>
                      <span class="checkmark"></span>
                    </label>
                  </div>
                  <span>Calculate shipping</span>
                </td>
              </tr>
              <tr class="cart-subtotal service-fee">
                <th>Service <span>(estimated for Pakistan)</span></th>
                <td data-title="Subtotal">
                  <span class="woocommerce-Price-amount amount">
                    <span class="woocommerce-Price-currencySymbol">$</span><span class="service-fee-value">5.60</span>
                  </span>
                </td>
              </tr>
              <tr class="order-total border-0">
                <th>Total</th>
                <td data-title="Total">
                  <span class="woocommerce-Price-amount amount">
                    <span class="woocommerce-Price-currencySymbol">$</span>64.69
                  </span>
                </td>
              </tr>
            </table>
          </div>
        </section>
      </form>
    </div>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"></script>

    <!--JQuery Steps Plugin-->
    <script src="js/jquery.steps.js"></script>

    <script type="module" src="js/index.js"></script>
  </body>
</html>
